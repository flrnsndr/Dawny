name: Deploy Website to IONOS

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
        working-directory: .

      - name: Deploy to IONOS via SFTP
        run: |
          lftp -u "${{ secrets.IONOS_FTP_USER }},${{ secrets.IONOS_FTP_PASSWORD }}" \
            sftp://${{ secrets.IONOS_FTP_HOST }} -e "
            set sftp:auto-confirm yes;
            mirror --reverse --delete --verbose dist/ ${{ secrets.IONOS_FTP_REMOTE_DIR }};
            quit"
